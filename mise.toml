[tools]
go = "1.26.0"
goreleaser = "2.13.3"

[tasks.test]
description = "Run Go tests"
run = "go test ./..."

[tasks.build]
description = "Build a native binary"
run = "mkdir -p dist && go build -o dist/mcp-server-wework ./cmd/mcp-server-wework"
sources = ["cmd/**/*.go", "internal/**/*.go", "go.mod", "go.sum"]
outputs = ["dist/mcp-server-wework"]

[tasks.install]
description = "Install mcp-server-wework locally"
run = "go install ./cmd/mcp-server-wework"

[tasks.sync_versions]
description = "Sync versions from npm/package.json"
run = "node scripts/sync_versions.mjs"

[tasks.goreleaser_snapshot]
description = "Build release artifacts via GoReleaser (snapshot)"
run = "goreleaser release --snapshot --clean --config .goreleaser.yml"

[tasks.goreleaser_release]
description = "Publish GitHub Release via GoReleaser"
run = "goreleaser release --clean --config .goreleaser.yml"

[tasks.release]
description = "Alias for goreleaser_release"
run = "mise run goreleaser_release"
